<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>SOS Mente Acelerada</title>
  <meta name="description" content="Método de regulação emocional para desacelerar sua mente em 10 minutos." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f2eef8; --card: #ffffff; --purple: #3d2e6b; --mid: #9b87c4;
      --pale: #e8e2f5; --gold: #c4922a; --goldlt: #f5e8c8;
      --text: #3a3060; --muted: #7a6e9a; --white: #fff;
    }
    html, body { height: 100%; background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); -webkit-font-smoothing: antialiased; }
    input::placeholder { color: var(--muted); opacity: .7; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--mid); border-radius: 99px; }
    @keyframes blink { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1)} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .screen { animation: fadeIn .22s ease; }
    .hover-left { transition: transform .15s; }
    .hover-left:hover { transform: translateX(4px); }
    button { font-family: 'DM Sans', sans-serif; }
  </style>
</head>
<body>
  <div id="app" style="min-height:100vh;background:var(--bg)"></div>

  <script>
    const C = {
      bg:'#f2eef8', card:'#ffffff', purple:'#3d2e6b', mid:'#9b87c4',
      pale:'#e8e2f5', gold:'#c4922a', goldlt:'#f5e8c8',
      text:'#3a3060', muted:'#7a6e9a', white:'#fff'
    };

    const TABS = [
      {id:'home', icon:'✦', label:'Início'},
      {id:'protocolo', icon:'◎', label:'Protocolo'},
      {id:'socorro', icon:'⊕', label:'Kit SOS'},
      {id:'mentor', icon:'✿', label:'Serenity'}
    ];

    const STEPS = [
      {num:1, title:'Reconheça', dur:60, desc:'Perceba o que está acontecendo no seu corpo agora. Sem julgamento — só observe.', inst:'Feche os olhos. Sinta onde a tensão está. Pode ser no peito, na garganta, nos ombros. Só note, sem tentar mudar nada ainda.', color:C.pale},
      {num:2, title:'Respire', dur:120, desc:'A respiração é o controle remoto do sistema nervoso. Vamos usá-la agora.', inst:'Inspire pelo nariz por 4 segundos. Segure por 7. Expire pela boca por 8 segundos. Repita 4 ciclos completos.', color:'#ede6f7', hasBreath:true},
      {num:3, title:'Ancore', dur:120, desc:'Traga sua atenção para o momento presente usando os sentidos.', inst:'Nomeie 5 coisas que você vê. 4 que pode tocar. 3 sons que ouve. 2 cheiros. 1 sabor. Isso é grounding.', color:C.goldlt},
      {num:4, title:'Libere', dur:180, desc:'Deixe o corpo soltar a tensão acumulada com movimento suave.', inst:'Tensione cada grupo muscular por 5 segundos e solte. Comece pelos pés, suba pelas pernas, abdômen, ombros, até o rosto.', color:C.pale},
      {num:5, title:'Restaure', dur:120, desc:'Seu sistema nervoso está se recalibrando. Permita o processo completar.', inst:'Respire naturalmente. Coloque uma mão no peito. Sinta o batimento. Você está seguro agora.', color:'#ede6f7'},
    ];

    const TECS = [
      {id:'resp', title:'Respiração 4-7-8', tag:'Ansiedade aguda', tc:C.mid, desc:'Ativa o nervo vago e desacelera o sistema nervoso em minutos.', steps:['Inspire pelo nariz por 4 segundos','Segure o ar por 7 segundos','Expire pela boca por 8 segundos','Repita 4 ciclos completos'], timer:76},
      {id:'ground', title:'Grounding 5-4-3-2-1', tag:'Pânico / Dissociação', tc:C.gold, desc:'Usa os sentidos para trazer a mente de volta ao presente imediato.', steps:['5 coisas que você VÊ agora','4 coisas que pode TOCAR','3 sons que você OUVE','2 cheiros que sente','1 sabor que percebe'], timer:120},
      {id:'frio', title:'Técnica do frio', tag:'Crise intensa', tc:'#6a9ecf', desc:'O frio ativa o reflexo de mergulho e interrompe o ciclo de pânico.', steps:['Encha uma bacia com água gelada','Mergulhe o rosto por 15-30s','Ou segure gelo nas palmas por 30s','Respire fundo após cada vez'], timer:30},
      {id:'musc', title:'Relaxamento muscular', tag:'Tensão corporal', tc:'#b07ecf', desc:'Tensionar e soltar libera a tensão física acumulada progressivamente.', steps:['Pés — tensione por 5s, solte por 10s','Pernas → abdômen → ombros','Mãos → braços → pescoço','Termine no rosto — ~15 min total'], timer:900},
    ];

    let state = {
      tab:'home', step:0, started:false, timer:0, breathing:false,
      breathPhase:'inspire', breathCount:4, breathScale:1, protoTimer:null,
      activeT:null, kitTimer:0, kitRunning:false, kitInterval:null,
      msgs:[{role:'assistant', content:'Olá, eu sou Serenity. Estou aqui com você agora. Como está se sentindo nesse momento?'}],
      loading:false, input:''
    };
    let breathInterval = null;

    function fmt(s) {
      const m = Math.floor(s/60), sec = s%60;
      return m > 0 ? m+':'+sec.toString().padStart(2,'0') : sec+'s';
    }

    function h(tag, props, children) {
      props = props || {};
      children = children || [];
      const el = document.createElement(tag);
      Object.entries(props).forEach(function(entry) {
        const k = entry[0], v = entry[1];
        if (k==='style' && typeof v==='object') Object.assign(el.style, v);
        else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
        else if (k==='className') el.className = v;
        else el.setAttribute(k, v);
      });
      children.forEach(function(c) {
        if (c!=null) el.appendChild(typeof c==='string' ? document.createTextNode(c) : c);
      });
      return el;
    }

    function renderHome() {
      const d = h('div', {style:{padding:'28px 22px 20px', maxWidth:'480px', margin:'0 auto'}, className:'screen'});
      const items = [
        {icon:'◎', title:'Protocolo SOS', desc:'Guia passo a passo de 10 minutos', tab:'protocolo', border:C.mid},
        {icon:'⊕', title:'Kit Socorro Imediato', desc:'Técnicas de emergência para crises', tab:'socorro', border:C.gold},
        {icon:'✿', title:'Mentor Serenity', desc:'IA disponível 24h para te guiar', tab:'mentor', border:'#b07ecf'},
      ];
      d.innerHTML =
        '<div style="text-align:center;margin-bottom:28px">' +
          '<div style="display:inline-block;background:'+C.pale+';border:1px solid '+C.mid+'55;border-radius:99px;padding:6px 16px;font-size:11px;font-weight:500;color:'+C.mid+';letter-spacing:.06em;margin-bottom:16px">🧠 MÉTODO DE REGULAÇÃO EMOCIONAL</div>' +
          '<h1 style="font-family:Playfair Display,serif;font-size:26px;font-weight:600;color:'+C.purple+';margin:0 0 4px;line-height:1.3">Sua mente não para?</h1>' +
          '<h1 style="font-family:Playfair Display,serif;font-size:26px;font-style:italic;font-weight:500;color:'+C.gold+';margin:0 0 12px;line-height:1.3">Pare em 10 minutos.</h1>' +
          '<p style="font-size:13px;color:'+C.muted+';line-height:1.7;margin:0">Pensamentos acelerados, ansiedade e sobrecarga não precisam ser o seu normal.</p>' +
        '</div>' +
        '<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px">' +
          items.map(function(item) {
            return '<div onclick="navigate(\''+item.tab+'\')" class="hover-left" style="background:'+C.card+';border-radius:16px;padding:15px 17px;display:flex;align-items:center;gap:13px;cursor:pointer;border-left:3px solid '+item.border+';box-shadow:0 1px 8px '+C.pale+'">' +
              '<span style="font-size:20px;color:'+item.border+'">'+item.icon+'</span>' +
              '<div style="flex:1"><div style="font-family:Playfair Display,serif;font-size:15px;font-weight:600;color:'+C.purple+'">'+item.title+'</div><div style="font-size:12px;color:'+C.muted+';margin-top:2px">'+item.desc+'</div></div>' +
              '<span style="color:'+C.mid+';font-size:14px">→</span></div>';
          }).join('') +
        '</div>' +
        '<div style="background:'+C.pale+';border-radius:14px;padding:15px 17px;border-left:3px solid '+C.mid+'">' +
          '<p style="margin:0;font-size:13px;color:'+C.muted+';line-height:1.75;font-style:italic;font-family:Playfair Display,serif">"Você não é ansioso — seu sistema nervoso está sobrecarregado. E isso tem solução."</p>' +
        '</div>';
      return d;
    }

    function renderProtocolo() {
      const s = STEPS[state.step];
      const pct = state.started ? Math.round(((s.dur - state.timer) / s.dur) * 100) : 0;
      const done = state.step === STEPS.length-1 && state.started && state.timer === 0;
      const d = h('div', {style:{padding:'24px 22px 20px', maxWidth:'480px', margin:'0 auto'}, className:'screen'});

      const dots = h('div', {style:{display:'flex', gap:'5px', marginBottom:'22px'}});
      STEPS.forEach(function(_,i) {
        dots.appendChild(h('div', {style:{flex:1, height:'4px', borderRadius:'99px', background: i<state.step ? C.purple : i===state.step ? C.mid : C.pale, transition:'background 0.4s'}}));
      });
      d.appendChild(dots);

      const card = h('div', {style:{background:C.card, borderRadius:'20px', padding:'22px', marginBottom:'14px', boxShadow:'0 2px 12px '+C.pale}});

      const hr = h('div', {style:{display:'flex', alignItems:'center', gap:'12px', marginBottom:'13px'}});
      const numCircle = h('div', {style:{width:'32px', height:'32px', borderRadius:'50%', background:C.pale, display:'flex', alignItems:'center', justifyContent:'center', fontSize:'13px', fontWeight:'600', color:C.purple, flexShrink:0}}, [String(s.num)]);
      const titleEl = h('h2', {style:{fontFamily:'Playfair Display,serif', fontSize:'21px', fontWeight:'600', color:C.purple, margin:'0', flex:1}}, [s.title]);
      hr.appendChild(numCircle);
      hr.appendChild(titleEl);
      if (state.started) {
        const timeEl = h('span', {id:'proto-time', style:{fontFamily:'Playfair Display,serif', fontSize:'20px', color:state.timer===0?C.gold:C.mid, fontWeight:'600'}}, [fmt(state.timer)]);
        hr.appendChild(timeEl);
      }
      card.appendChild(hr);
      card.appendChild(h('p', {style:{fontSize:'13px', color:C.muted, lineHeight:'1.7', margin:'0 0 13px'}}, [s.desc]));

      const inst = h('div', {style:{background:s.color, borderRadius:'12px', padding:'13px 15px'}});
      inst.appendChild(h('p', {style:{margin:'0', fontSize:'14px', color:C.purple, lineHeight:'1.75', fontFamily:'Playfair Display,serif', fontStyle:'italic'}}, [s.inst]));
      card.appendChild(inst);

      if (s.hasBreath && state.started) {
        const orbWrap = h('div', {style:{display:'flex', flexDirection:'column', alignItems:'center', gap:'11px', margin:'18px 0'}});
        const orb = h('div', {id:'breath-orb', style:{width:'100px', height:'100px', borderRadius:'50%', background:'radial-gradient(circle at 35% 35%, '+C.mid+', '+C.purple+')', transform:'scale('+state.breathScale+')', transition:'transform .3s ease-in-out', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', boxShadow:'0 0 0 14px '+C.pale}, onClick:toggleBreath});
        orb.appendChild(h('span', {style:{fontSize:'24px', color:C.white, fontFamily:'Playfair Display,serif', fontWeight:'500'}}, [state.breathing ? String(state.breathCount) : '✦']));
        orbWrap.appendChild(orb);
        orbWrap.appendChild(h('span', {style:{fontSize:'13px', color:C.muted, fontStyle:'italic', fontFamily:'Playfair Display,serif', textTransform:'capitalize'}}, [state.breathing ? state.breathPhase : 'toque para respirar']));
        card.appendChild(orbWrap);
      }

      if (state.started && state.timer === 0) {
        card.appendChild(h('div', {style:{marginTop:'13px', background:C.pale, borderRadius:'10px', padding:'9px 13px', fontSize:'13px', color:C.purple, textAlign:'center'}}, ['✓ Etapa concluída']));
      }
      d.appendChild(card);

      if (state.started) {
        const pb = h('div', {style:{background:C.pale, borderRadius:'99px', height:'5px', marginBottom:'14px', overflow:'hidden'}});
        pb.appendChild(h('div', {id:'proto-bar', style:{width:pct+'%', height:'100%', background:C.mid, borderRadius:'99px', transition:'width 1s linear'}}));
        d.appendChild(pb);
      }

      const btns = h('div', {style:{display:'flex', gap:'10px'}});
      if (!state.started) {
        btns.appendChild(h('button', {style:{flex:1, padding:'15px', borderRadius:'14px', background:C.purple, border:'none', color:C.white, fontSize:'15px', fontWeight:'500', cursor:'pointer'}, onClick:startProtocol}, ['Iniciar protocolo']));
      } else {
        btns.appendChild(h('button', {style:{padding:'13px 18px', borderRadius:'14px', background:'transparent', border:'1px solid '+C.pale, color:C.muted, fontSize:'13px', cursor:'pointer'}, onClick:resetProtocol}, ['Reiniciar']));
        const isLast = state.step === STEPS.length-1;
        const nextBtn = h('button', {style:{flex:1, padding:'13px', borderRadius:'14px', background:isLast?C.pale:C.purple, border:'none', color:isLast?C.muted:C.white, fontSize:'14px', fontWeight:'500', cursor:isLast?'default':'pointer'}}, [isLast ? 'Protocolo completo' : 'Próxima etapa →']);
        if (!isLast) nextBtn.addEventListener('click', nextStep);
        btns.appendChild(nextBtn);
      }
      d.appendChild(btns);

      if (done) {
        const fc = h('div', {style:{marginTop:'14px', background:C.pale, borderRadius:'16px', padding:'18px', textAlign:'center'}});
        fc.innerHTML = '<div style="font-size:28px;margin-bottom:7px">✨</div><p style="font-family:Playfair Display,serif;font-size:15px;color:'+C.purple+';margin:0 0 3px">Protocolo concluído</p><p style="font-size:12px;color:'+C.muted+';margin:0">Seu sistema nervoso está mais regulado agora.</p>';
        d.appendChild(fc);
      }
      return d;
    }

    function renderKitSocorro() {
      const d = h('div', {style:{padding:'24px 22px 20px', maxWidth:'480px', margin:'0 auto'}, className:'screen'});
      d.appendChild(h('h2', {style:{fontFamily:'Playfair Display,serif', fontSize:'21px', fontWeight:'600', color:C.purple, margin:'0 0 4px'}}, ['Kit Socorro Imediato']));
      d.appendChild(h('p', {style:{fontSize:'13px', color:C.muted, margin:'0 0 20px'}}, ['Para quando a ansiedade bate forte agora.']));

      if (!state.activeT) {
        const list = h('div', {style:{display:'flex', flexDirection:'column', gap:'10px'}});
        TECS.forEach(function(t) {
          const item = h('div', {className:'hover-left', style:{background:C.card, borderRadius:'16px', padding:'15px 17px', cursor:'pointer', borderLeft:'3px solid '+t.tc, boxShadow:'0 1px 8px '+C.pale}});
          item.addEventListener('click', function() { startTec(t); });
          item.innerHTML =
            '<div style="display:flex;align-items:center;gap:9px;margin-bottom:5px">' +
              '<span style="font-family:Playfair Display,serif;font-size:15px;font-weight:600;color:'+C.purple+'">'+t.title+'</span>' +
              '<span style="font-size:11px;padding:2px 8px;border-radius:99px;background:'+t.tc+'22;color:'+t.tc+';font-weight:500">'+t.tag+'</span>' +
            '</div>' +
            '<p style="margin:0 0 5px;font-size:13px;color:'+C.muted+';line-height:1.6">'+t.desc+'</p>' +
            '<span style="font-size:12px;color:'+C.mid+'">⏱ '+fmt(t.timer)+' · toque para usar</span>';
          list.appendChild(item);
        });
        d.appendChild(list);
      } else {
        const t = state.activeT;
        const backBtn = h('button', {style:{background:'none', border:'none', color:C.muted, fontSize:'13px', cursor:'pointer', marginBottom:'13px', padding:'0'}}, ['← Voltar']);
        backBtn.addEventListener('click', closeTec);
        d.appendChild(backBtn);

        const card = h('div', {style:{background:C.card, borderRadius:'20px', padding:'22px', boxShadow:'0 2px 12px '+C.pale}});
        const tag = h('span', {style:{fontSize:'11px', padding:'3px 10px', borderRadius:'99px', background:t.tc+'20', color:t.tc, fontWeight:'500'}}, [t.tag]);
        card.appendChild(tag);
        card.appendChild(h('h3', {style:{fontFamily:'Playfair Display,serif', fontSize:'19px', color:C.purple, margin:'10px 0 6px'}}, [t.title]));
        card.appendChild(h('p', {style:{fontSize:'13px', color:C.muted, lineHeight:'1.7', margin:'0 0 17px'}}, [t.desc]));

        const stepsList = h('div', {style:{display:'flex', flexDirection:'column', gap:'8px', marginBottom:'20px'}});
        t.steps.forEach(function(step, i) {
          const row = h('div', {style:{display:'flex', gap:'11px', alignItems:'flex-start'}});
          const num = h('div', {style:{width:'22px', height:'22px', borderRadius:'50%', background:C.pale, display:'flex', alignItems:'center', justifyContent:'center', fontSize:'11px', fontWeight:'600', color:C.purple, flexShrink:0, marginTop:'1px'}}, [String(i+1)]);
          row.appendChild(num);
          row.appendChild(h('span', {style:{fontSize:'14px', lineHeight:'1.6'}}, [step]));
          stepsList.appendChild(row);
        });
        card.appendChild(stepsList);

        const timeDiv = h('div', {style:{textAlign:'center', marginBottom:'14px'}});
        const timeEl = h('div', {id:'kit-time', style:{fontSize:'44px', fontWeight:'600', color:state.kitTimer===0?C.gold:C.purple, fontFamily:'Playfair Display,serif', lineHeight:'1'}}, [fmt(state.kitTimer)]);
        timeDiv.appendChild(timeEl);
        if (state.kitTimer===0) {
          timeDiv.appendChild(h('div', {style:{fontSize:'13px', color:C.gold, marginTop:'5px'}}, ['Técnica concluída ✓']));
        }
        card.appendChild(timeDiv);

        const kitBtn = h('button', {style:{width:'100%', padding:'14px', borderRadius:'14px', background:state.kitTimer===0?C.pale:state.kitRunning?C.goldlt:C.purple, border:'none', color:state.kitTimer===0?C.muted:state.kitRunning?C.gold:C.white, fontSize:'15px', fontWeight:'500', cursor:state.kitTimer===0?'default':'pointer'}},
          [state.kitTimer===0 ? 'Técnica concluída' : state.kitRunning ? 'Pausar' : 'Iniciar timer']);
        if (state.kitTimer !== 0) kitBtn.addEventListener('click', toggleKit);
        card.appendChild(kitBtn);
        d.appendChild(card);
      }
      return d;
    }

    function renderMentor() {
      const d = h('div', {style:{display:'flex', flexDirection:'column', height:'calc(100vh - 120px)', maxWidth:'480px', margin:'0 auto'}, className:'screen'});

      const head = h('div', {style:{padding:'14px 22px 0', flexShrink:0}});
      head.innerHTML = '<div style="display:flex;align-items:center;gap:11px"><div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,'+C.mid+','+C.purple+');display:flex;align-items:center;justify-content:center;font-size:17px">🧠</div><div><div style="font-family:Playfair Display,serif;font-size:15px;font-weight:600;color:'+C.purple+'">Mentor Serenity</div><div style="font-size:11px;color:'+C.mid+'">disponível agora · IA</div></div></div>';
      d.appendChild(head);

      const msgs = h('div', {id:'msgs-container', style:{flex:1, overflowY:'auto', padding:'14px 22px', display:'flex', flexDirection:'column', gap:'9px'}});
      state.msgs.forEach(function(m) { msgs.appendChild(makeBubble(m)); });

      if (state.loading) {
        const wrap = h('div', {style:{display:'flex'}});
        const inner = h('div', {style:{padding:'11px 15px', borderRadius:'16px 16px 16px 4px', background:C.card, display:'flex', gap:'5px', alignItems:'center', boxShadow:'0 1px 6px '+C.pale}});
        [0,.2,.4].forEach(function(delay) {
          inner.appendChild(h('div', {style:{width:'7px', height:'7px', borderRadius:'50%', background:C.mid, animation:'blink 1.2s '+delay+'s infinite'}}));
        });
        wrap.appendChild(inner); msgs.appendChild(wrap);
      }

      if (state.msgs.length === 1 && !state.loading) {
        const sugs = h('div', {style:{display:'flex', flexWrap:'wrap', gap:'7px', marginTop:'6px'}});
        ['Minha mente não para','Estou com ansiedade agora','Não consigo dormir','Me ensina uma técnica'].forEach(function(s) {
          const btn = h('button', {style:{padding:'7px 12px', borderRadius:'99px', background:C.pale, border:'none', color:C.purple, fontSize:'12px', cursor:'pointer'}}, [s]);
          btn.addEventListener('click', function() { sendMsg(s); });
          sugs.appendChild(btn);
        });
        msgs.appendChild(sugs);
      }

      const anchor = h('div', {id:'msgs-bottom'});
      msgs.appendChild(anchor);
      d.appendChild(msgs);

      const inp = h('div', {style:{padding:'10px 22px 16px', flexShrink:0}});
      const row = h('div', {style:{display:'flex', gap:'8px', background:C.card, borderRadius:'14px', padding:'7px 7px 7px 14px', border:'1px solid '+C.pale, boxShadow:'0 1px 8px '+C.pale}});
      const input = h('input', {id:'mentor-input', placeholder:'Como está se sentindo?', style:{flex:1, border:'none', background:'transparent', fontSize:'14px', color:C.text, outline:'none'}});
      input.value = state.input;
      input.addEventListener('input', function(e) { state.input = e.target.value; });
      input.addEventListener('keydown', function(e) { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } });
      const sb = h('button', {id:'send-btn', style:{width:'38px', height:'38px', borderRadius:'10px', background:state.input.trim()&&!state.loading?C.purple:C.pale, border:'none', cursor:state.input.trim()&&!state.loading?'pointer':'default', color:state.input.trim()&&!state.loading?C.white:C.muted, fontSize:'17px', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, transition:'background .2s'}}, ['→']);
      sb.addEventListener('click', function() { sendMsg(); });
      row.appendChild(input); row.appendChild(sb); inp.appendChild(row); d.appendChild(inp);
      setTimeout(function() { anchor.scrollIntoView({behavior:'smooth'}); }, 100);
      return d;
    }

    function makeBubble(m) {
      const wrap = h('div', {style:{display:'flex', justifyContent:m.role==='user'?'flex-end':'flex-start'}});
      wrap.appendChild(h('div', {style:{maxWidth:'82%', padding:'11px 15px', borderRadius:m.role==='user'?'16px 16px 4px 16px':'16px 16px 16px 4px', background:m.role==='user'?C.purple:C.card, color:m.role==='user'?C.white:C.text, fontSize:'14px', lineHeight:'1.7', fontFamily:m.role==='assistant'?'Playfair Display,serif':'DM Sans,sans-serif', boxShadow:m.role==='assistant'?'0 1px 6px '+C.pale:'none'}}, [m.content]));
      return wrap;
    }

    async function sendMsg(text) {
      const msg = text || state.input.trim();
      if (!msg || state.loading) return;
      state.input = ''; state.loading = true;
      state.msgs.push({role:'user', content:msg});
      render();
      try {
        const res = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer SUA_CHAVE_AQUI',
          },
          body: JSON.stringify({
            model: 'gpt-4o-mini',
            max_tokens: 1000,
            messages: [
              { role: 'system', content: 'Você é Serenity, mentor de regulação emocional do SOS Mente Acelerada. Tom: acolhedor, gentil, presente. Ajude com: reconhecer sentimentos, técnicas de regulação do sistema nervoso (respiração 4-7-8, grounding 5-4-3-2-1, relaxamento muscular), sair de crises. Nunca use linguagem clínica. Valide o sentimento antes de técnicas. Respostas curtas. Não substitui terapia.' },
              ...state.msgs.map(function(m) { return {role: m.role, content: m.content}; })
            ]
          })
        });
        const data = await res.json();
        const reply = data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
        state.msgs.push({role:'assistant', content: reply || 'Estou aqui. Pode me contar mais?'});
      } catch(err) {
        state.msgs.push({role:'assistant', content:'Tive uma dificuldade técnica. Mas estou aqui — tente novamente.'});
      }
      state.loading = false; render();
    }

    function startProtocol() {
      state.started = true;
      state.timer = STEPS[state.step].dur;
      clearInterval(state.protoTimer);
      state.protoTimer = setInterval(tickProto, 1000);
      render();
    }

    function tickProto() {
      state.timer--;
      if (state.timer <= 0) { state.timer = 0; clearInterval(state.protoTimer); }
      const t = document.getElementById('proto-time');
      if (t) { t.textContent = fmt(state.timer); t.style.color = state.timer===0 ? C.gold : C.mid; }
      const b = document.getElementById('proto-bar');
      if (b) { const s = STEPS[state.step]; b.style.width = Math.round(((s.dur-state.timer)/s.dur)*100)+'%'; }
    }

    function nextStep() {
      if (state.step < STEPS.length-1) {
        clearInterval(state.protoTimer);
        clearInterval(breathInterval);
        state.step++;
        state.timer = 0;
        state.breathing = false;
        state.breathScale = 1;
        render();
      }
    }

    function resetProtocol() {
      clearInterval(state.protoTimer);
      clearInterval(breathInterval);
      state.step = 0; state.started = false; state.timer = 0;
      state.breathing = false; state.breathScale = 1;
      render();
    }

    function toggleBreath() {
      state.breathing = !state.breathing;
      clearInterval(breathInterval);
      if (state.breathing) {
        const phases = [{l:'inspire',d:4,s:1.4},{l:'segure',d:7,s:1.4},{l:'expire',d:8,s:1}];
        let pi = 0, rem = phases[0].d;
        state.breathPhase = phases[0].l; state.breathCount = phases[0].d; state.breathScale = phases[0].s;
        breathInterval = setInterval(function() {
          rem--; state.breathCount = rem;
          const orb = document.getElementById('breath-orb');
          if (orb) orb.querySelector('span').textContent = rem;
          if (rem <= 0) {
            pi = (pi+1)%3; rem = phases[pi].d;
            state.breathPhase = phases[pi].l; state.breathCount = phases[pi].d; state.breathScale = phases[pi].s;
            if (orb) {
              orb.style.transition = 'transform '+(pi===0?4:pi===1?.1:8)+'s ease-in-out';
              orb.style.transform = 'scale('+phases[pi].s+')';
            }
          }
        }, 1000);
      } else { render(); }
    }

    function startTec(t) { state.activeT = t; state.kitTimer = t.timer; state.kitRunning = false; clearInterval(state.kitInterval); render(); }
    function closeTec() { state.activeT = null; clearInterval(state.kitInterval); state.kitRunning = false; render(); }

    function toggleKit() {
      if (state.kitRunning) {
        clearInterval(state.kitInterval); state.kitRunning = false;
      } else {
        state.kitRunning = true;
        state.kitInterval = setInterval(function() {
          state.kitTimer--;
          if (state.kitTimer <= 0) { state.kitTimer = 0; clearInterval(state.kitInterval); state.kitRunning = false; }
          const t = document.getElementById('kit-time');
          if (t) t.textContent = fmt(state.kitTimer);
        }, 1000);
      }
      render();
    }

    function navigate(tab) {
      state.tab = tab;
      if (tab === 'protocolo') {
        clearInterval(state.protoTimer); clearInterval(breathInterval);
        state.step = 0; state.started = false; state.timer = 0; state.breathing = false;
      }
      render();
    }

    function renderNav() {
      const existing = document.getElementById('bottom-nav');
      if (existing) existing.remove();
      const nav = h('div', {id:'bottom-nav', style:{position:'fixed', bottom:0, left:0, right:0, zIndex:10, background:C.bg, borderTop:'1px solid '+C.pale, display:'flex', padding:'7px 0 10px'}});
      TABS.forEach(function(t) {
        const btn = h('button', {style:{flex:1, background:'none', border:'none', cursor:'pointer', display:'flex', flexDirection:'column', alignItems:'center', gap:'3px', padding:'4px 0', color:state.tab===t.id?C.purple:C.muted, transition:'color .2s'}});
        btn.addEventListener('click', function() { navigate(t.id); });
        btn.innerHTML = '<span style="font-size:17px;line-height:1">'+t.icon+'</span><span style="font-size:10px;font-weight:'+(state.tab===t.id?500:400)+'">'+t.label+'</span>';
        nav.appendChild(btn);
      });
      return nav;
    }

    function render() {
      const app = document.getElementById('app');
      app.innerHTML = '';
      const bar = h('div', {style:{position:'sticky', top:0, zIndex:10, background:C.bg, padding:'13px 22px 9px', borderBottom:'1px solid '+C.pale, display:'flex', alignItems:'center', justifyContent:'center'}});
      bar.innerHTML = '<span style="font-family:Playfair Display,serif;font-size:15px;font-weight:600;color:'+C.purple+'">🧠 SOS Mente Acelerada</span>';
      app.appendChild(bar);
      const content = h('div', {style:{paddingBottom:'80px'}});
      if (state.tab==='home') content.appendChild(renderHome());
      else if (state.tab==='protocolo') content.appendChild(renderProtocolo());
      else if (state.tab==='socorro') content.appendChild(renderKitSocorro());
      else if (state.tab==='mentor') content.appendChild(renderMentor());
      app.appendChild(content);
      document.body.appendChild(renderNav());
    }

    render();
  </script>
</body>
</html>
